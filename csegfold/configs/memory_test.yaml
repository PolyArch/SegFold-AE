# Memory Backend Test Configuration
# Run with: ./csegfold --config ../configs/memory_test.yaml

# PE Array Configuration
physical_pe_row_num: 4
physical_pe_col_num: 4
virtual_pe_row_num: 4
virtual_pe_col_num: 4

# Memory Hierarchy - Set to true to enable memory backend tracking
enable_memory_hierarchy: true
memory_backend_type: "ideal"  # Options: "ideal" or "ramulator2"
dram_config_file: "configs/dram/DDR4_8Gb_x8_3200.yaml"

# L1 Cache Configuration
l1_size_kb: 64
l1_associativity: 8
l1_line_size: 64
l1_latency: 1

# L2 Cache Configuration
l2_size_kb: 512
l2_associativity: 16
l2_line_size: 64
l2_latency: 10

# DRAM Latency (for ideal backend)
ideal_dram_latency: 100

# Memory Address Offsets
a_pointer_offset: 0x1000
b_pointer_offset: 0x2000
c_pointer_offset: 0x3000
cache_line_size: 64

# Core Simulation Settings
enable_multi_b_row_loading: true
enable_b_row_reordering: true
enable_dynamic_routing: true
enable_partial_b_load: true
enable_dynamic_scheduling: true
enable_tile_eviction: true
enable_spatial_folding: true
enable_dynamic_tiling: true
enable_a_csc: true

# FIFO Settings
enable_sw_pe_fifo: true
sw_pe_fifo_size: 16
enable_fifo_bypass: true

# Timing
num_cycles_load_a: 1
num_cycles_load_b: 1
num_cycles_store_c: 0
num_cycles_mult_ii: 1
II: 2

# B Loader
b_loader_window_size: 32
b_loader_row_limit: 16
enable_b_loader_fifo: true
b_loader_fifo_size: 8

# SPAD
enable_spad: true
spad_load_ports_per_bank: 1
spad_store_ports_per_bank: 1

# Debug/Output
verbose: false
very_verbose: false
show_progress: false
save_trace: false
run_check: false
max_cycle: 10000000
