# =============================================================================
# B SRAM Configuration for SegFold — 1024 x 56-bit (rounded to 8KB)
# Technology: 32nm
# =============================================================================

# 1024 entries x 8 bytes = 8192 bytes (56-bit data padded to 64-bit word)
-size (bytes) 8192

# Power gating
-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# One entry per line (8 bytes = 64 bits)
-block size (bytes) 8

# Direct-mapped (simple addressed SRAM, no associativity needed)
-associativity 1

# 1 exclusive read port + 1 exclusive write port (matching RTL: 1R/1W)
-read-write port 0
-exclusive read port 1
-exclusive write port 1
-single ended read ports 0

# Single bank
-UCA bank count 1

# Technology node: 32nm
-technology (u) 0.032

# Not main memory
-page size (bits) 8192
-burst length 8
-internal prefetch width 8

# High-performance cell type
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# Bus width: 64 bits (8 bytes per entry)
-output/input bus width 64

# Operating temperature
-operating temperature (K) 350

# RAM type (scratchpad — no tag array)
-cache type "ram"

# Tag size (not used for RAM, but required by parser)
-tag size (b) "default"

# Access mode
-access mode (normal, sequential, fast) - "fast"

# Design objective: balanced
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:0:100
-deviate (delay, dynamic power, leakage power, cycle time, area) 100000:100000:100000:100000:1000000

# UCA model
-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

# Wire
-Wire signaling (fullswing, lowswing, default) - "default"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"

# Not used for UCA RAM
-Core count 1
-Cache level (L2/L3) - "L2"

# No ECC (matches RTL — raw data storage)
-Add ECC - "false"

# Output detail level
-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "true"

# Don't force config — let CACTI find optimal
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

# DRAM parameters (unused but required)
-dram_type "DDR3"
-io state "WRITE"
-addr_timing 1.0
-mem_density 4 Gb
-bus_freq 800 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-rtt_value 10000
-ron_value 34
-tflight_value
-num_bobs 1
-capacity 80
-num_channels_per_bob 1
-first metric "Cost"
-second metric "Bandwidth"
-third metric "Energy"
-DIMM model "ALL"
-mirror_in_bob "F"
